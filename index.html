

<html>
<head>
    <meta charset="utf-8" />
    <title>Venue Database</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <script type="text/javascript" src="https://unpkg.com/xlsx@0.15.1/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h2 class="text-center mt-4 mb-4">Venue Database</h2>
        <div id="file_info" class="text-center mb-3" style="color: #666;"></div>
        <div class="card filters-card">
            <div class="card-header"><b>Filters</b></div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <label for="country_filter">Filter by Country:</label>
                        <select id="country_filter" class="form-control">
                            <option value="">All Countries</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="filetype_filter">Filter by File Type:</label>
                        <select id="filetype_filter" class="form-control">
                            <option value="">All File Types</option>
                        </select>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-md-12">
                        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                            <button id="reset_filters" class="btn btn-secondary">Reset Filters</button>
                            <label style="display:flex;align-items:center;gap:8px;margin:0;">
                                <input type="checkbox" id="country_expand_toggle" style="margin:0;"> 
                                <span style="font-size:0.95rem;color:#bfbfbf;">Expand City </span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="card stats-card mt-3">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <h5 id="country_count" class="mb-0">Countries: 0</h5>
                    </div>
                    <div class="col-md-4">
                        <h5 id="city_count" class="mb-0">Cities: 0</h5>
                    </div>
                    <div class="col-md-4">
                        <h5 id="venue_count" class="mb-0">Venues: 0</h5>
                    </div>
                </div>
            </div>
        </div>
        <div id="excel_data" class="mt-5"></div>
    </div>
    <!-- Bootstrap and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B0UglyR+LyTjo3oCq5m5ERf5W4LkI2J1nFZC+6bQ5P4eXoIm+8T94W5ad3y1QK6i" crossorigin="anonymous"></script>
    <script src="js/venuedb.js"></script>
    </body>
</html>
